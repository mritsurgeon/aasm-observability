services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: arsp
      POSTGRES_PASSWORD: arsp
      POSTGRES_DB: arsp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arsp"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - arsp-net

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/arsp_password
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - arsp-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://arsp:arsp@postgres:5432/arsp
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=arsp_password
    volumes:
      - ./backend:/app
    networks:
      - arsp-net
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - arsp-net
    depends_on:
      - backend

networks:
  arsp-net:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
